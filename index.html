<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pixel Art Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #e0d5c1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #c9a96e;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-style: italic;
            color: #a68a64;
            font-size: 1.1em;
        }

        .controls {
            background: rgba(20, 20, 40, 0.8);
            border: 2px solid #c9a96e;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
            backdrop-filter: blur(10px);
        }

        .input-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        #themeInput {
            flex: 1;
            padding: 15px 20px;
            background: rgba(30, 30, 60, 0.9);
            border: 2px solid #4a4a6a;
            border-radius: 10px;
            color: #e0d5c1;
            font-family: 'Georgia', serif;
            font-size: 1.1em;
            transition: all 0.3s ease;
            outline: none;
        }

        #themeInput:focus {
            border-color: #c9a96e;
            box-shadow: 0 0 20px rgba(201, 169, 110, 0.3);
        }

        #themeInput::placeholder {
            color: #6a6a8a;
            font-style: italic;
        }

        .generate-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #c9a96e, #8b6914);
            border: none;
            border-radius: 10px;
            color: #1a1a2e;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Georgia', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .generate-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(201, 169, 110, 0.4);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .canvas-container {
            position: relative;
            background: rgba(20, 20, 40, 0.9);
            border: 5px solid #c9a96e;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            display: none;
        }

        .canvas-container.visible {
            display: block;
        }

        .frame {
            border: 20px solid #8b6914;
            border-image: linear-gradient(135deg, #c9a96e, #6b4914) 1;
            padding: 5px;
            background: #1a1a2e;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: #000;
            max-width: 100%;
            height: auto;
        }

        .artwork-info {
            text-align: center;
            margin-top: 15px;
            font-style: italic;
            color: #a68a64;
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid #c9a96e;
            border-radius: 8px;
            padding: 12px 20px;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px;
            color: #c9a96e;
            font-size: 1.2em;
        }

        .loading.visible {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(201, 169, 110, 0.3);
            border-radius: 50%;
            border-top-color: #c9a96e;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .generate-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎨 AI Pixel Art Generator</h1>
        <p class="subtitle">Write any theme and watch AI create unique pixel art</p>
    </div>

    <div class="controls">
        <div class="input-group">
            <input 
                type="text" 
                id="themeInput" 
                placeholder="Enter a theme... (e.g., 'scary monster', 'sunset over mountains', 'futuristic city')"
                maxlength="100"
            >
            <button class="generate-btn" id="generateBtn">Generate Art</button>
        </div>
    </div>

    <div class="loading" id="loading">
        <span class="spinner"></span>
        Creating your pixel art masterpiece...
    </div>

    <div class="canvas-container" id="canvasContainer">
        <div class="frame">
            <canvas id="pixelCanvas"></canvas>
        </div>
        <div class="artwork-info" id="artworkInfo"></div>
    </div>

    <script>
        class PixelArtGenerator {
            constructor() {
                this.canvas = document.getElementById('pixelCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.size = 96; // 96x96 pixels for high detail
                this.pixelSize = 6;
                this.canvas.width = this.size * this.pixelSize;
                this.canvas.height = this.size * this.pixelSize;
                
                this.init();
            }

            init() {
                const generateBtn = document.getElementById('generateBtn');
                const themeInput = document.getElementById('themeInput');
                
                generateBtn.addEventListener('click', () => this.generate());
                themeInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.generate();
                    }
                });
            }

            generate() {
                const themeInput = document.getElementById('themeInput');
                const theme = themeInput.value.trim();
                
                if (!theme) {
                    themeInput.focus();
                    themeInput.style.borderColor = '#ff4444';
                    setTimeout(() => {
                        themeInput.style.borderColor = '#4a4a6a';
                    }, 1500);
                    return;
                }

                this.showLoading(true);
                
                // Simulate AI processing time
                setTimeout(() => {
                    const pixelData = this.createPixelArtFromTheme(theme);
                    this.renderPixelArt(pixelData);
                    this.showCanvas(true);
                    this.showLoading(false);
                    
                    document.getElementById('artworkInfo').textContent = 
                        `"${theme}" - AI Generated Pixel Art • ${this.size}×${this.size} pixels`;
                }, 500);
            }

            createPixelArtFromTheme(theme) {
                const pixels = this.createEmptyPixels();
                const seed = this.hashString(theme);
                
                // Analyze theme for keywords
                const themeLower = theme.toLowerCase();
                
                if (this.containsAny(themeLower, ['monster', 'scary', 'horror', 'fear', 'creepy', 'dark', 'demon', 'ghost'])) {
                    this.generateMonster(pixels, seed);
                } else if (this.containsAny(themeLower, ['castle', 'dragon', 'fantasy', 'magic', 'wizard', 'fairy', 'knight', 'medieval'])) {
                    this.generateFantasyScene(pixels, seed);
                } else if (this.containsAny(themeLower, ['nature', 'forest', 'mountain', 'tree', 'sunset', 'landscape', 'ocean', 'river', 'flower', 'garden'])) {
                    this.generateNatureScene(pixels, seed);
                } else if (this.containsAny(themeLower, ['space', 'sci-fi', 'spaceship', 'alien', 'planet', 'star', 'galaxy', 'ufo', 'robot'])) {
                    this.generateSciFiScene(pixels, seed);
                } else if (this.containsAny(themeLower, ['city', 'building', 'cyberpunk', 'neon', 'future', 'urban', 'dystopian'])) {
                    this.generateCyberpunkScene(pixels, seed);
                } else if (this.containsAny(themeLower, ['abstract', 'geometric', 'pattern', 'colorful', 'shapes'])) {
                    this.generateAbstractArt(pixels, seed);
                } else if (this.containsAny(themeLower, ['pyramid', 'ancient', 'egypt', 'temple', 'ruins', 'historical'])) {
                    this.generateAncientScene(pixels, seed);
                } else if (this.containsAny(themeLower, ['surreal', 'dream', 'melting', 'clock', 'dali', 'strange', 'weird'])) {
                    this.generateSurrealScene(pixels, seed);
                } else if (this.containsAny(themeLower, ['portrait', 'face', 'person', 'character', 'human'])) {
                    this.generatePortrait(pixels, seed);
                } else if (this.containsAny(themeLower, ['animal', 'cat', 'dog', 'bird', 'fish', 'wildlife'])) {
                    this.generateAnimal(pixels, seed, themeLower);
                } else {
                    // Default: mix of styles based on theme
                    this.generateMixedStyle(pixels, seed, theme);
                }
                
                return pixels;
            }

            createEmptyPixels() {
                return new Array(this.size).fill(null).map(() => 
                    new Array(this.size).fill(null).map(() => [0, 0, 0])
                );
            }

            hashString(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) {
                    const char = str.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash; // Convert to 32bit integer
                }
                return Math.abs(hash);
            }

            containsAny(str, keywords) {
                return keywords.some(keyword => str.includes(keyword));
            }

            seededRandom(seed, index) {
                const x = Math.sin(seed * 12.9898 + index * 78.233) * 43758.5453;
                return x - Math.floor(x);
            }

            generateMonster(pixels, seed) {
                const cx = Math.floor(this.size / 2);
                const cy = Math.floor(this.size / 2);
                const eyeCount = 1 + Math.floor(this.seededRandom(seed, 1) * 3);
                
                // Dark background
                this.fillGradient(pixels, [10, 0, 20], [40, 10, 40], 'radial', cx, cy);
                
                // Body shape
                this.drawBlob(pixels, cx, cy, 15 + this.seededRandom(seed, 2) * 20, [60, 20, 40], seed + 1);
                
                // Multiple eyes
                for (let e = 0; e < eyeCount; e++) {
                    const angle = (e / eyeCount) * Math.PI * 2 + this.seededRandom(seed, 3 + e) * 0.5;
                    const ex = cx + Math.cos(angle) * 12;
                    const ey = cy - 5 + Math.sin(angle) * 8;
                    
                    this.drawCircle(pixels, ex, ey, 4, [220, 220, 100]);
                    this.drawCircle(pixels, ex, ey, 2, [200, 0, 0]); // Pupil
                }
                
                // Mouth with teeth
                const mouthY = cy + 8;
                for (let y = mouthY - 2; y <= mouthY + 3; y++) {
                    for (let x = cx - 10; x <= cx + 10; x++) {
                        const mouthShape = Math.abs(x - cx) < (12 - Math.abs(y - mouthY) * 1.5);
                        if (mouthShape && this.isInBounds(x, y)) {
                            pixels[y][x] = [180, 0, 0];
                        }
                    }
                }
                
                // Sharp teeth
                for (let x = cx - 9; x <= cx + 9; x += 2) {
                    const toothY = mouthY + 1;
                    if (this.isInBounds(x, toothY)) pixels[toothY][x] = [255, 255, 255];
                    if (this.isInBounds(x, toothY + 1)) pixels[toothY + 1][x] = [255, 255, 255];
                }
                
                // Tentacles
                for (let t = 0; t < 6; t++) {
                    this.drawTentacle(pixels, cx, cy + 10, seed + 10 + t, t * 60);
                }
            }

            generateFantasyScene(pixels, seed) {
                // Sky gradient
                this.fillGradient(pixels, [20, 20, 60], [80, 60, 120], 'vertical');
                
                // Stars
                for (let i = 0; i < 30; i++) {
                    const sx = Math.floor(this.seededRandom(seed + i, 100) * this.size);
                    const sy = Math.floor(this.seededRandom(seed + i + 30, 101) * this.size * 0.6);
                    if (this.isInBounds(sx, sy)) {
                        pixels[sy][sx] = [255, 255, 200];
                    }
                }
                
                // Mountains
                for (let m = 0; m < 3; m++) {
                    const mx = 20 + m * 30;
                    const mh = 40 + this.seededRandom(seed, 102 + m) * 30;
                    this.drawTriangle(pixels, mx, this.size - 10, mh, [60, 50, 70]);
                }
                
                // Castle
                const castleX = Math.floor(this.size / 2);
                this.drawCastle(pixels, castleX, this.size - 15, seed);
                
                // Moon
                this.drawCircle(pixels, this.size - 15, 15, 10, [255, 255, 200]);
            }

            generateNatureScene(pixels, seed) {
                // Sky
                this.fillGradient(pixels, [135, 206, 235], [255, 200, 100], 'vertical');
                
                // Sun
                this.drawCircle(pixels, this.size - 20, 15, 12, [255, 255, 100]);
                
                // Ground
                for (let y = this.size - 25; y < this.size; y++) {
                    for (let x = 0; x < this.size; x++) {
                        const shade = 34 + this.seededRandom(seed + x + y * this.size, 200) * 30;
                        pixels[y][x] = [Math.floor(shade), Math.floor(shade * 2.2), Math.floor(shade * 0.4)];
                    }
                }
                
                // Trees
                for (let t = 0; t < 6; t++) {
                    const tx = 10 + t * 15 + Math.floor(this.seededRandom(seed + t, 201) * 8);
                    this.drawTree(pixels, tx, this.size - 25, 25 + this.seededRandom(seed + t + 6, 202) * 20, seed + t);
                }
                
                // Flowers
                for (let f = 0; f < 15; f++) {
                    const fx = Math.floor(this.seededRandom(seed + f + 100, 203) * this.size);
                    const fy = this.size - 5 - Math.floor(this.seededRandom(seed + f + 115, 204) * 5);
                    this.drawFlower(pixels, fx, fy, seed + f + 200);
                }
            }

            generateSciFiScene(pixels, seed) {
                // Space
                this.fillSolid(pixels, [5, 5, 25]);
                
                // Stars
                for (let i = 0; i < 100; i++) {
                    const sx = Math.floor(this.seededRandom(seed + i, 300) * this.size);
                    const sy = Math.floor(this.seededRandom(seed + i + 100, 301) * this.size);
                    if (this.isInBounds(sx, sy)) {
                        const brightness = 150 + Math.floor(this.seededRandom(seed + i + 200, 302) * 105);
                        pixels[sy][sx] = [brightness, brightness, brightness];
                    }
                }
                
                // Planet
                const px = Math.floor(this.size * 0.3);
                const py = Math.floor(this.size * 0.4);
                this.drawCircle(pixels, px, py, 15, [100, 150, 200]);
                // Planet ring
                this.drawEllipse(pixels, px, py, 25, 5, [150, 200, 255]);
                
                // Spaceship
                const sx = Math.floor(this.size * 0.7);
                const sy = Math.floor(this.size * 0.5);
                this.drawSpaceship(pixels, sx, sy, seed);
            }

            generateCyberpunkScene(pixels, seed) {
                // Dark city
                this.fillGradient(pixels, [10, 5, 20], [30, 10, 40], 'vertical');
                
                // Buildings
                for (let b = 0; b < 12; b++) {
                    const bx = 5 + b * 8;
                    const bh = 30 + Math.floor(this.seededRandom(seed + b, 400) * 40);
                    
                    for (let y = this.size - bh; y < this.size; y++) {
                        for (let x = bx; x < bx + 6; x++) {
                            if (this.isInBounds(x, y)) {
                                pixels[y][x] = [25, 25, 35];
                                // Windows
                                if ((x - bx) % 3 === 1 && (this.size - y) % 5 === 1) {
                                    const windowColor = this.seededRandom(seed + b + x + y, 401) > 0.5 ? 
                                        [255, 255, 100] : [100, 255, 255];
                                    pixels[y][x] = windowColor;
                                }
                            }
                        }
                    }
                }
                
                // Neon signs
                for (let n = 0; n < 8; n++) {
                    const nx = 10 + n * 10;
                    const ny = 20 + Math.floor(this.seededRandom(seed + n + 500, 402) * 30);
                    const neonColor = [[255, 0, 255], [0, 255, 255], [255, 255, 0], [255, 0, 128]][n % 4];
                    
                    for (let i = 0; i < 8; i++) {
                        const signX = nx + i;
                        const signY = ny;
                        if (this.isInBounds(signX, signY)) {
                            pixels[signY][signX] = neonColor;
                        }
                    }
                }
            }

            generateAbstractArt(pixels, seed) {
                // Colorful background
                for (let y = 0; y < this.size; y++) {
                    for (let x = 0; x < this.size; x++) {
                        pixels[y][x] = [
                            Math.floor(100 + Math.sin(x * 0.1) * 50 + Math.cos(y * 0.1) * 50),
                            Math.floor(100 + Math.cos(x * 0.15) * 50 + Math.sin(y * 0.08) * 50),
                            Math.floor(100 + Math.sin(x * 0.08 + y * 0.1) * 50)
                        ];
                    }
                }
                
                // Geometric shapes
                for (let s = 0; s < 8; s++) {
                    const sx = Math.floor(this.seededRandom(seed + s, 500) * this.size);
                    const sy = Math.floor(this.seededRandom(seed + s + 8, 501) * this.size);
                    const color = [
                        Math.floor(this.seededRandom(seed + s + 16, 502) * 255),
                        Math.floor(this.seededRandom(seed + s + 24, 503) * 255),
                        Math.floor(this.seededRandom(seed + s + 32, 504) * 255)
                    ];
                    
                    if (s % 3 === 0) {
                        this.drawCircle(pixels, sx, sy, 10 + Math.floor(this.seededRandom(seed + s + 40, 505) * 15), color);
                    } else if (s % 3 === 1) {
                        this.drawSquare(pixels, sx, sy, 8 + Math.floor(this.seededRandom(seed + s + 48, 506) * 12), color);
                    } else {
                        this.drawTriangle(pixels, sx, sy, 12 + Math.floor(this.seededRandom(seed + s + 56, 507) * 15), color);
                    }
                }
            }

            generateAncientScene(pixels, seed) {
                // Sand background
                for (let y = 0; y < this.size; y++) {
                    for (let x = 0; x < this.size; x++) {
                        const shade = 180 + this.seededRandom(seed + x + y * this.size, 600) * 40;
                        pixels[y][x] = [Math.floor(shade), Math.floor(shade * 0.8), Math.floor(shade * 0.5)];
                    }
                }
                
                // Sky
                for (let y = 0; y < this.size * 0.3; y++) {
                    for (let x = 0; x < this.size; x++) {
                        const blueShade = 100 + (y / (this.size * 0.3)) * 100;
                        pixels[y][x] = [Math.floor(blueShade * 0.5), Math.floor(blueShade * 0.7), Math.floor(blueShade)];
                    }
                }
                
                // Pyramid
                const px = Math.floor(this.size / 2);
                const py = this.size - 20;
                const ph = 45;
                
                for (let y = py - ph; y < py; y++) {
                    const width = (py - y) * 1.5;
                    const startX = px - Math.floor(width / 2);
                    const endX = px + Math.floor(width / 2);
                    
                    for (let x = startX; x <= endX; x++) {
                        if (this.isInBounds(x, y)) {
                            const shade = 180 + (py - y) * 1.5;
                            pixels[y][x] = [Math.floor(shade), Math.floor(shade * 0.75), Math.floor(shade * 0.4)];
                        }
                    }
                }
            }

            generateSurrealScene(pixels, seed) {
                // Dreamy background
                this.fillGradient(pixels, [255, 200, 150], [150, 100, 200], 'vertical');
                
                // Melting clocks
                for (let c = 0; c < 3; c++) {
                    const cx = 20 + c * 25;
                    const cy = 30 + c * 20;
                    this.drawMeltingClock(pixels, cx, cy, seed + c);
                }
                
                // Floating objects
                for (let o = 0; o < 5; o++) {
                    const ox = Math.floor(this.seededRandom(seed + o, 700) * this.size);
                    const oy = Math.floor(this.seededRandom(seed + o + 5, 701) * this.size);
                    this.drawCircle(pixels, ox, oy, 5, [200, 150, 200]);
                }
            }

            generatePortrait(pixels, seed) {
                // Face background
                this.fillSolid(pixels, [40, 30, 30]);
                
                const cx = Math.floor(this.size / 2);
                const cy = Math.floor(this.size / 2);
                
                // Face shape
                this.drawEllipse(pixels, cx, cy, 20, 28, [220, 180, 140]);
                
                // Eyes
                this.drawCircle(pixels, cx - 8, cy - 5, 3, [255, 255, 255]);
                this.drawCircle(pixels, cx + 8, cy - 5, 3, [255, 255, 255]);
                this.drawCircle(pixels, cx - 8, cy - 5, 1.5, [50, 100, 200]);
                this.drawCircle(pixels, cx + 8, cy - 5, 1.5, [50, 100, 200]);
                
                // Nose
                this.drawLine(pixels, cx, cy - 2, cx, cy + 5, [200, 160, 120], 2);
                
                // Mouth
                for (let x = cx - 6; x <= cx + 6; x++) {
                    const my = cy + 10 + Math.sin((x - cx) * 0.3) * 2;
                    const mpy = Math.floor(my);
                    const mpx = Math.floor(x);
                    if (this.isInBounds(mpx, mpy)) {
                        pixels[mpy][mpx] = [180, 100, 100];
                    }
                }
                
                // Hair
                for (let y = cy - 25; y < cy - 5; y++) {
                    for (let x = cx - 18; x <= cx + 18; x++) {
                        const dist = Math.sqrt((x - cx) ** 2 + (y - cy + 15) ** 2);
                        if (dist < 22 && dist > 18 && this.isInBounds(x, y)) {
                            pixels[y][x] = [60, 40, 20];
                        }
                    }
                }
            }

            generateAnimal(pixels, seed, theme) {
                this.fillSolid(pixels, [200, 220, 200]);
                
                const cx = Math.floor(this.size / 2);
                const cy = Math.floor(this.size / 2);
                
                // Body
                this.drawEllipse(pixels, cx, cy + 10, 25, 20, [150, 130, 100]);
                
                // Head
                this.drawCircle(pixels, cx, cy - 10, 12, [150, 130, 100]);
                
                // Eyes
                this.drawCircle(pixels, cx - 4, cy - 13, 2, [255, 255, 255]);
                this.drawCircle(pixels, cx + 4, cy - 13, 2, [255, 255, 255]);
                this.drawCircle(pixels, cx - 4, cy - 13, 1, [0, 0, 0]);
                this.drawCircle(pixels, cx + 4, cy - 13, 1, [0, 0, 0]);
                
                // Nose
                this.drawCircle(pixels, cx, cy - 8, 2, [0, 0, 0]);
                
                // Ears
                this.drawTriangle(pixels, cx - 10, cy - 18, 8, [150, 130, 100]);
                this.drawTriangle(pixels, cx + 10, cy - 18, 8, [150, 130, 100]);
                
                // Legs
                for (let l = 0; l < 2; l++) {
                    const lx = cx - 8 + l * 16;
                    for (let y = cy + 25; y < cy + 35; y++) {
                        for (let x = lx - 2; x <= lx + 2; x++) {
                            if (this.isInBounds(x, y)) {
                                pixels[y][x] = [120, 100, 80];
                            }
                        }
                    }
                }
            }

            generateMixedStyle(pixels, seed, theme) {
                // Create a unique style based on the theme string
                const hash = this.hashString(theme);
                
                for (let y = 0; y < this.size; y++) {
                    for (let x = 0; x < this.size; x++) {
                        const r = Math.floor(Math.abs(Math.sin(hash + x * 0.1 + y * 0.15)) * 200) + 20;
                        const g = Math.floor(Math.abs(Math.cos(hash + x * 0.08 + y * 0.12)) * 200) + 20;
                        const b = Math.floor(Math.abs(Math.sin(hash + x * 0.12 + y * 0.09)) * 200) + 20;
                        
                        pixels[y][x] = [

                }

            drawCircle(pixels, cx, cy, radius, color) {

                        if (dist <= radius && this.isInBounds(x, y)) {

            drawTriangle(pixels, cx, bottomY, height, color) {

                    }
                }
            }

                        }
                    }
                }
            }

                    }
                    if (e2 < dx) {

                        y += sy;
                    }
                }
            }
